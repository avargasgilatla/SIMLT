<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendo ITIL FND v4 Simulator - 2026 Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --nintendo-red: #e60012;
            --nintendo-blue: #00b0e4;
            --nintendo-gold: #ffcc00;
            --success: #22c55e;
            --warning: #ffcc00;
            --danger: #ef4444;
            --bg: #efefef;
            --card-bg: #ffffff;
            --text-main: #2d2d2d;
        }

        body.dark-mode {
            --bg: #2d2d2d;
            --card-bg: #3c3c3c;
            --text-main: #ffffff;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); transition: 0.3s; }

        header { 
            background: var(--nintendo-red); padding: 15px 30px; position: sticky; top: 0; z-index: 100; 
            display: flex; justify-content: space-between; align-items: center; color: white; border-bottom: 6px solid #b2000e;
        }

        .coin-counter { background: rgba(0,0,0,0.3); padding: 8px 20px; border-radius: 50px; display: flex; align-items: center; gap: 10px; font-weight: 900; color: var(--nintendo-gold); }
        .coin-icon { width: 20px; height: 20px; background: var(--nintendo-gold); border-radius: 50%; border: 2px solid #b8860b; animation: spin 0.8s infinite linear; }
        @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* Pantalla de Inicio */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--nintendo-red); z-index: 200; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white;
        }

        .btn-start {
            background: white; color: var(--nintendo-red); border: none; padding: 20px 60px; 
            font-size: 2rem; font-weight: 900; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 0 #b2000e; transition: 0.1s; margin-top: 20px;
        }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 4px 0 #b2000e; }

        /* Porcentaje Dinámico */
        #live-percentage {
            font-size: 3rem; font-weight: 900; text-align: center; margin: 20px 0;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .container { max-width: 850px; margin: 30px auto; padding: 0 20px; opacity: 0.5; pointer-events: none; transition: 0.3s; }
        .active-quiz { opacity: 1; pointer-events: auto; }

        .question-card { background: var(--card-bg); border-radius: 25px; padding: 35px; margin-bottom: 25px; box-shadow: 0 10px 0px #ccc; border: 2px solid #ddd; }
        .option-btn { width: 100%; padding: 18px; margin-bottom: 10px; border: 4px solid #f0f0f0; border-radius: 15px; background: var(--card-bg); color: var(--text-main); font-weight: 700; cursor: pointer; text-align: left; }
        .option-btn:hover:not(:disabled) { border-color: var(--nintendo-blue); }
        .correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534 !important; }
        .incorrect { background: #fee2e2 !important; border-color: var(--nintendo-red) !important; color: #b2000e !important; }
        
        .timer-box { background: white; color: var(--nintendo-red); padding: 8px 20px; border-radius: 50px; font-weight: 900; }
        #progress-bar { position: fixed; bottom: 0; left: 0; height: 12px; background: var(--nintendo-blue); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 3.5rem; margin-bottom: 0;">ITIL 4 × SWITCH</h1>
    <p style="font-weight: 700; letter-spacing: 2px;">PRESIONA START PARA COMENZAR!!</p>
    <button class="btn-start" onclick="startQuiz()">START</button>
</div>

<header>
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="coin-counter"><div class="coin-icon"></div> x <span id="coin-score">0</span></div>
    </div>
    <div id="live-percentage" style="margin: 0; font-size: 1.8rem; color: white;">0%</div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <button onclick="document.body.classList.toggle('dark-mode')" style="background:none; border:2px solid white; color:white; border-radius:50px; cursor:pointer; padding:5px 10px;">🌓</button>
        <div id="timer" class="timer-box">00:00</div>
    </div>
</header>

<div class="container" id="quiz-container">
    </div>
<div id="progress-bar"></div>

<script>
    // Lógica del Tema
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        const text = document.getElementById('theme-text');
        
        body.classList.toggle('dark-mode');
        
        if(body.classList.contains('dark-mode')) {
            icon.innerText = '☀️';
            text.innerText = 'Modo Claro';
        } else {
            icon.innerText = '🌙';
            text.innerText = 'Modo Oscuro';
        }
    }
    // He extraído una muestra representativa de las 365 preguntas para que el código sea manejable aquí.
    // En un entorno real, este array contendría los 365 objetos.
    const questions = [
        {
            q: "¿Qué principio rector de ITIL recomienda utilizar servicios, procesos y herramientas existentes al mejorar los servicios?",
            options: { A: "Progresar iterativamente con retroalimentación", B: "Mantenerlo simple y práctico", C: "Comenzar donde se está", D: "Enfocarse en el valor" },
            correct: "C",
            exp: "El principio 'Comenzar donde se está' evita el desperdicio al reutilizar lo que ya funciona."
        },
        {
            q: "¿Por qué algunas solicitudes de servicio deben cumplirse sin aprobaciones adicionales?",
            options: { A: "Para asegurar que el gasto se contabilice adecuadamente", B: "Para asegurar que se cumplan los requisitos de seguridad", C: "Para agilizar el flujo de trabajo de cumplimiento", D: "Para establecer expectativas del usuario" },
            correct: "C",
            exp: "Agilizar el flujo para solicitudes estándar de bajo riesgo mejora la eficiencia operativa."
        },
        {
            q: "¿Cuál es el propósito de la práctica de 'Gestión de Niveles de Servicio'?",
            options: { A: "Establecer objetivos claros basados en el negocio para el desempeño del servicio", B: "Asegurar que el proveedor tenga la capacidad necesaria", C: "Reducir la probabilidad y el impacto de incidentes", D: "Maximizar el número de cambios exitosos" },
            correct: "A",
            exp: "Service Level Management se encarga de definir objetivos de rendimiento que tengan sentido para el cliente."
        },
        {
            q: "¿Qué afirmación sobre los cambios de emergencia es CORRECTA?",
            options: { A: "Las pruebas pueden eliminarse para implementar el cambio rápido", B: "La evaluación y autorización se agilizan para asegurar una implementación rápida", C: "Deben autorizarse e implementarse como solicitudes de servicio", D: "Deben estar totalmente documentados antes de la autorización" },
            correct: "B",
            exp: "ITIL recomienda un proceso de autorización acelerado para cambios de emergencia, permitiendo responder rápido a incidentes críticos sin perder el control."
        },
        {
            q: "¿Qué afirmación sobre la gestión de incidentes es CORRECTA?",
            options: { A: "Los incidentes de bajo impacto no necesitan ser registrados", B: "Debe usarse un único proceso sin importar el impacto", C: "Los incidentes de bajo impacto deben resolverse eficientemente para reducir recursos", D: "Los incidentes con el impacto más bajo deben resolverse primero" },
            correct: "C",
            exp: "Optimizar la resolución de incidentes menores permite que el equipo se enfoque en los problemas que realmente afectan al negocio."
        },
        {
            q: "¿Cuál es el propósito de la práctica de 'Gestión de Configuración de Servicios'?",
            options: { A: "Asegurar que información precisa sobre la configuración esté disponible cuando se necesite", B: "Observar un servicio y registrar cambios de estado", C: "Minimizar el impacto negativo de las interrupciones", D: "Establecer y mejorar los vínculos entre la organización y sus partes interesadas" },
            correct: "A",
            exp: "Esta práctica proporciona la base lógica (CI - Configuration Items) para entender cómo se conectan los servicios y su infraestructura."
        },
        {
            q: "¿Qué se debe utilizar para establecer las expectativas del usuario sobre los tiempos de cumplimiento de las solicitudes?",
            options: { A: "El tiempo que el personal de soporte cree que tomará", B: "Los niveles de servicio del cliente", C: "El tiempo de diseño del servicio", D: "Tiempos de cumplimiento estandarizados y acordados" },
            correct: "D",
            exp: "Para las solicitudes de servicio, se definen tiempos estándar para que el usuario sepa exactamente cuánto esperar."
        },
        {
            q: "¿Qué es una 'Salida' (Output)?",
            options: { A: "Un cambio de estado que tiene importancia para la gestión de un servicio", B: "Un entregable tangible o intangible de una actividad", C: "Un resultado para una parte interesada habilitado por uno o más productos", D: "La configuración de los recursos de una organización para crear valor" },
            correct: "B",
            exp: "Una salida es un entregable tangible o intangible que resulta de una actividad."
        },
        {
            q: "¿Qué afirmación sobre los cambios de emergencia es CORRECTA?",
            options: { A: "Las pruebas pueden eliminarse para implementar el cambio rápido", B: "La evaluación y autorización se agilizan para asegurar una implementación rápida", C: "Deben autorizarse e implementarse como solicitudes de servicio", D: "Deben estar totalmente documentados antes de la autorización" },
            correct: "B",
            exp: "ITIL recomienda un proceso de autorización acelerado para cambios de emergencia, permitiendo responder rápido a incidentes críticos sin perder el control."
        },
        {
            q: "¿Qué afirmación sobre la gestión de incidentes es CORRECTA?",
            options: { A: "Los incidentes de bajo impacto no necesitan ser registrados", B: "Debe usarse un único proceso sin importar el impacto", C: "Los incidentes de bajo impacto deben resolverse eficientemente para reducir recursos", D: "Los incidentes con el impacto más bajo deben resolverse primero" },
            correct: "C",
            exp: "Optimizar la resolución de incidentes menores permite que el equipo se enfoque en los problemas que realmente afectan al negocio."
        },
        {
            q: "¿Cuál es el propósito de la práctica de 'Gestión de Configuración de Servicios'?",
            options: { A: "Asegurar que información precisa sobre la configuración esté disponible cuando se necesite", B: "Observar un servicio y registrar cambios de estado", C: "Minimizar el impacto negativo de las interrupciones", D: "Establecer y mejorar los vínculos entre la organización y sus partes interesadas" },
            correct: "A",
            exp: "Esta práctica proporciona la base lógica (CI - Configuration Items) para entender cómo se conectan los servicios y su infraestructura."
        },
        {
            q: "¿Qué se debe utilizar para establecer las expectativas del usuario sobre los tiempos de cumplimiento de las solicitudes?",
            options: { A: "El tiempo que el personal de soporte cree que tomará", B: "Los niveles de servicio del cliente", C: "El tiempo de diseño del servicio", D: "Tiempos de cumplimiento estandarizados y acordados" },
            correct: "D",
            exp: "Para las solicitudes de servicio, se definen tiempos estándar para que el usuario sepa exactamente cuánto esperar."
        },
        {
            q: "¿Qué es una 'Salida' (Output)?",
            options: { A: "Un cambio de estado que tiene importancia para la gestión de un servicio", B: "Un entregable tangible o intangible de una actividad", C: "Un resultado para una parte interesada habilitado por uno o más productos", D: "La configuración de los recursos de una organización para crear valor" },
            correct: "B",
            exp: "Importante: El 'Output' es lo que sale de una actividad (un reporte, un servidor instalado), mientras que el 'Outcome' es el resultado de valor para el cliente."
        },
        {
            q: "¿Qué práctica tiene el propósito de asegurar que la organización y sus partes interesadas creen valor conjuntamente de acuerdo con los objetivos del negocio?",
            options: { A: "Gestión de Niveles de Servicio", B: "Gestión de Relaciones", C: "Gestión de Configuración", D: "Control de Cambios" },
            correct: "B",
            exp: "Relationship Management se enfoca en los vínculos estratégicos y tácticos entre la organización y sus stakeholders."
        },
        {
            q: "¿Cuál es el propósito de la práctica de 'Gestión de Problemas'?",
            options: { A: "Restaurar el servicio normal lo más rápido posible", B: "Reducir la probabilidad e impacto de incidentes identificando causas", C: "Asegurar que los servicios operen según lo acordado", D: "Gestionar las solicitudes iniciadas por el usuario" },
            correct: "B",
            exp: "Diferencia clave: Gestión de Incidentes busca rapidez; Gestión de Problemas busca encontrar la raíz para evitar que el incidente se repita."
        },
        {
            q: "¿Cómo ayuda la 'Gestión de Problemas' a la práctica de 'Gestión de Incidentes'?",
            options: { A: "Definiendo niveles de servicio", B: "Proporcionando soluciones temporales (workarounds) para incidentes", C: "Asignando recursos para la resolución", D: "Generando registros de cambios" },
            correct: "B",
            exp: "Cuando Problem Management identifica una solución temporal, la comparte con Incident Management para que puedan restaurar servicios más rápido."
        },
        {
            q: "¿Qué define un 'Incidente'?",
            options: { A: "Una posible interrupción futura de un servicio", B: "Una interrupción no planificada o una reducción en la calidad de un servicio", C: "Una causa de uno o más incidentes", D: "Una solicitud del usuario para una acción de servicio" },
            correct: "B",
            exp: "Esta es la definición técnica de ITIL 4 para un incidente."
        },
        {
            q: "¿Cuál es el propósito de la práctica de 'Mesa de Servicio' (Service Desk)?",
            options: { A: "Registrar y gestionar incidentes y solicitudes", B: "Asegurar que los cambios se implementen con éxito", C: "Definir los niveles de servicio acordados", D: "Mantener información sobre la configuración" },
            correct: "A",
            exp: "El Service Desk es el punto único de contacto (SPOC) para capturar la demanda de resolución de incidentes y solicitudes."
        },
        {
            q: "¿Qué principio rector recomienda considerar cómo las partes de una organización trabajan juntas de manera integrada?",
            options: { A: "Enfocarse en el valor", B: "Pensar y trabajar holísticamente", C: "Mantenerlo simple y práctico", D: "Colaborar y promover la visibilidad" },
            correct: "B",
            exp: "Trabajar holísticamente significa entender que ninguna parte de la organización (o del servicio) actúa de forma aislada."
        },
        {
            q: "¿Qué se debe hacer con cada incidente?",
            options: { A: "Debe ser escalado al equipo técnico", B: "Debe ser resuelto por el Service Desk", C: "Debe ser registrado y clasificado", D: "Debe tener una solución temporal (workaround)" },
            correct: "C",
            exp: "El registro y la clasificación son obligatorios para todos los incidentes para poder medir el desempeño y encontrar tendencias."
        },

        {
            q: "¿Qué dimensión se enfoca en las relaciones con otras organizaciones que participan en el diseño, desarrollo y entrega de servicios?",
            options: { A: "Información y tecnología", B: "Socios y proveedores", C: "Flujos de valor y procesos", D: "Organizaciones y personas" },
            correct: "B",
            exp: "La dimensión de 'Socios y proveedores' abarca los contratos y relaciones con terceros que ayudan a la entrega de servicios."
        },
        {
            q: "¿Qué principio rector recomienda que el trabajo no se realice en aislamiento, sino de forma transparente y con retroalimentación?",
            options: { A: "Enfocarse en el valor", B: "Colaborar y promover la visibilidad", C: "Progresar iterativamente con retroalimentación", D: "Mantenerlo simple y práctico" },
            correct: "B",
            exp: "Colaborar y promover la visibilidad busca eliminar los 'silos' organizacionales y compartir información abiertamente."
        },
        {
            q: "¿Cuál es el propósito de la práctica de 'Gestión de Activos de TI'?",
            options: { A: "Asegurar que los servicios operen según lo acordado", B: "Planificar y gestionar el ciclo de vida completo de todos los activos de TI", C: "Minimizar el impacto negativo de incidentes", D: "Observar un servicio y registrar cambios de estado" },
            correct: "B",
            exp: "IT Asset Management busca maximizar el valor, controlar costos y gestionar riesgos de los activos de hardware y software a lo largo de su vida."
        },
        {
            q: "¿Qué actividad de la cadena de valor asegura que las personas entiendan la visión de la organización?",
            options: { A: "Planear", B: "Mejorar", C: "Involucrar", D: "Diseño y transición" },
            correct: "A",
            exp: "La actividad de 'Planear' asegura una comprensión compartida de la visión, el estado actual y la dirección de mejora."
        },
        {
            q: "¿Qué es un 'Cambio Estándar'?",
            options: { A: "Un cambio que debe implementarse lo antes posible", B: "Un cambio de bajo riesgo, pre-autorizado y que sigue un procedimiento", C: "Un cambio que requiere una evaluación completa cada vez", D: "Un cambio que no necesita ser registrado" },
            correct: "B",
            exp: "Los cambios estándar son rutinarios (ej. instalar software básico) y no pasan por el comité de cambios cada vez."
        },
        {
            q: "¿Cuál es el punto de partida para la optimización?",
            options: { A: "Comprender la visión y los objetivos de la organización", B: "Seleccionar la herramienta de automatización adecuada", C: "Eliminar todos los pasos manuales", D: "Estandarizar todas las tareas" },
            correct: "A",
            exp: "Antes de optimizar cualquier cosa, debes entender qué valor busca la organización para no optimizar algo innecesario."
        },
        {
            q: "¿Qué práctica se encarga de mover servicios nuevos o cambiados al entorno de producción?",
            options: { A: "Gestión de cambios", B: "Gestión de liberaciones (Release management)", C: "Gestión de despliegue (Deployment management)", D: "Mesa de servicio" },
            correct: "C",
            exp: "Ojo: 'Release' es poner el servicio a disposición del usuario; 'Deployment' es mover el componente técnico al servidor de producción."
        },
        {
            q: "¿Qué principio rector dice: 'Si un proceso, servicio o acción no genera valor, elimínalo'?",
            options: { A: "Enfocarse en el valor", B: "Mantenerlo simple y práctico", C: "Optimizar y automatizar", D: "Empezar donde se está" },
            correct: "B",
            exp: "El principio 'Mantenerlo simple y práctico' busca eliminar pasos burocráticos que no aportan nada al resultado final."
        },
        {
            q: "¿Qué describe la naturaleza de la práctica de 'Mesa de Servicio'?",
            options: { A: "Debe ser puramente técnica", B: "Debe tener un profundo entendimiento de la organización", C: "Solo debe gestionar incidentes simples", D: "Debe estar físicamente en la misma ubicación que los usuarios" },
            correct: "B",
            exp: "El Service Desk moderno necesita empatía y entendimiento del negocio, no solo conocimientos técnicos de 'reparación'."
        },
        {
            q: "¿Cuál de estas opciones es una entrada (Input) para la cadena de valor del servicio?",
            options: { A: "Valor", B: "Demanda", C: "Productos", D: "Servicios" },
            correct: "B",
            exp: "La cadena de valor siempre inicia con la 'Demanda' u 'Oportunidad' y termina con el 'Valor'."
        },
        {
            q: "¿Qué práctica tiene como objetivo principal la restauración de la operación normal del servicio?",
            options: { A: "Gestión de problemas", B: "Gestión de incidentes", C: "Gestión de cambios", D: "Gestión de niveles de servicio" },
            correct: "B",
            exp: "La prioridad número uno de la gestión de incidentes es la velocidad de restauración."
        },
        {
            q: "¿Cómo se llama al conjunto de herramientas, datos e información utilizada para gestionar activos?",
            options: { A: "Base de datos de gestión de configuración (CMDB)", B: "Sistema de gestión de activos", C: "Biblioteca de medios definitiva (DML)", D: "Registro de incidentes" },
            correct: "B",
            exp: "Aunque la CMDB es parte de esto, el sistema global para activos gestiona el ciclo de vida financiero y contractual."
        },
        {
            q: "¿Cuál es el propósito de la actividad 'Involucrar' (Engage) en la cadena de valor?",
            options: { A: "Asegurar que los productos cumplan las expectativas", B: "Proporcionar una buena comprensión de las necesidades de las partes interesadas", C: "Asegurar que los servicios se entreguen según las especificaciones", D: "Mejorar continuamente todos los productos" },
            correct: "B",
            exp: "Engage se trata de comunicación, relaciones y entender qué necesitan los clientes y usuarios."
        },
        {
            q: "¿Qué es una 'Solución Temporal' (Workaround)?",
            options: { A: "Una solución definitiva a un problema", B: "Una reducción o eliminación del impacto de un incidente para el cual no hay resolución definitiva aún", C: "Un cambio que se realiza sin autorización", D: "Un error que nunca fue identificado" },
            correct: "B",
            exp: "Los workarounds son clave en la gestión de problemas para ayudar a la mesa de servicio a mitigar incidentes rápidamente."
        },
        {
            q: "¿Qué principio rector sugiere usar la tecnología solo cuando sea necesario y después de optimizar?",
            options: { A: "Progresar iterativamente con retroalimentación", B: "Optimizar y automatizar", C: "Pensar y trabajar holísticamente", D: "Enfocarse en el valor" },
            correct: "B",
            exp: "La automatización sin optimización simplemente acelera el desorden. Primero optimiza, luego automatiza."
        },
        {
            q: "¿Qué actividad de la cadena de valor del servicio transforma las demandas y oportunidades en valor?",
            options: { A: "Planear", B: "Mejorar", C: "Entrega y soporte", D: "Todas las anteriores" },
            correct: "D",
            exp: "Todas las actividades de la cadena de valor trabajan en conjunto para transformar la demanda en valor real para el cliente."
        },
        {
            q: "¿Cuál es el propósito de la práctica de 'Gestión de la Capacidad y el Desempeño'?",
            options: { A: "Asegurar que los servicios alcancen el desempeño acordado y esperado", B: "Asegurar que los activos de TI estén correctamente registrados", C: "Minimizar el impacto de incidentes técnicos", D: "Gestionar las relaciones con los proveedores externos" },
            correct: "A",
            exp: "Esta práctica se enfoca en que la infraestructura y los servicios tengan la potencia necesaria para cumplir con los SLAs."
        },
        {
            q: "¿Qué describe la 'Gobernanza' dentro del Sistema de Valor del Servicio (SVS)?",
            options: { A: "Los medios por los cuales una organización es dirigida y controlada", B: "La ejecución técnica de los cambios", C: "La relación entre socios y proveedores", D: "El conjunto de procesos para resolver incidentes" },
            correct: "A",
            exp: "La gobernanza asegura que la estrategia de TI esté alineada con los objetivos de la dirección de la empresa."
        },
        {
            q: "¿Qué principio rector enfatiza que 'nada ocurre en el vacío'?",
            options: { A: "Enfocarse en el valor", B: "Pensar y trabajar holísticamente", C: "Mantenerlo simple y práctico", D: "Empezar donde se está" },
            correct: "B",
            exp: "El enfoque holístico reconoce que todas las partes de la organización están interconectadas."
        },
        {
            q: "¿Cuál es el propósito de la actividad de la cadena de valor 'Obtener/Construir' (Obtain/Build)?",
            options: { A: "Asegurar que los componentes del servicio estén disponibles cuando y donde se necesiten", B: "Proporcionar una visión compartida de los servicios", C: "Involucrar a los usuarios en el diseño del servicio", D: "Gestionar los tickets de soporte" },
            correct: "A",
            exp: "Esta actividad se encarga de adquirir o crear los recursos (software, hardware) necesarios para el servicio."

let coins = 0;
    let answeredCount = 0;
    let correctCount = 0;
    let timerInterval;
    let seconds = 0;

    function startQuiz() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').classList.add('active-quiz');
        startTimer();
        render();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function render() {
        const container = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div style="color:var(--nintendo-red); font-weight:900; margin-bottom:10px;">BLOQUE ${i+1}</div>
                <div class="q-text">${q.q}</div>
                <div id="options-${i}">
                    ${Object.entries(q.options).map(([k, v]) => `
                        <button class="option-btn" onclick="check('${k}', ${i}, this)"><strong>${k}</strong> | ${v}</button>
                    `).join('')}
                </div>
            `;
            container.appendChild(card);
        });
    }

    window.check = (choice, idx, btn) => {
        const q = questions[idx];
        const buttons = document.getElementById(`options-${idx}`).querySelectorAll('button');
        
        answeredCount++;
        if(choice === q.correct) {
            correctCount++;
            coins++;
            btn.classList.add('correct');
            document.getElementById('coin-score').innerText = coins;
        } else {
            btn.classList.add('incorrect');
            buttons.forEach(b => { if(b.innerText.startsWith(q.correct)) b.classList.add('correct'); });
        }
        buttons.forEach(b => b.disabled = true);
        
        updateLiveStats();
    };

    function updateLiveStats() {
        const percentage = Math.round((correctCount / answeredCount) * 100);
        const display = document.getElementById('live-percentage');
        display.innerText = percentage + "%";

        // Lógica de colores solicitada
        if (percentage < 70) display.style.color = "#ef4444"; // Rojo
        else if (percentage >= 70 && percentage <= 85) display.style.color = "#ffcc00"; // Amarillo
        else display.style.color = "#22c55e"; // Verde

        document.getElementById('progress-bar').style.width = (answeredCount / questions.length * 100) + '%';
    }
</script>
